<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Robot Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/roslib@1.4.1/build/roslib.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background:#0f1419; color:#e6e6e6; padding:1.5rem; margin:0; }
    h1 { font-size:1.4rem; }
    #status { padding:.4rem .9rem; border-radius:8px; font-weight:600; display:inline-block; font-size:.9rem; }
    .ok { background:#16351f; color:#5be08a; } .bad { background:#3a1620; color:#ff6b8a; } .wait { background:#2a2618; color:#e0c45b; }
    .panel { margin-top:1.2rem; background:#1a2029; border-radius:12px; padding:1rem; display:inline-block; }
    .label { opacity:.6; font-size:.8rem; margin-bottom:.4rem; }
    canvas { background:#11161d; border-radius:8px; image-rendering:pixelated; display:block; }
  </style>
</head>
<body>
  <h1>Robot Dashboard</h1>
  <div id="status" class="wait">connecting…</div>
  <div class="panel">
    <div class="label">live map (/map)</div>
    <canvas id="mapCanvas" width="80" height="60" style="width:480px;height:360px;"></canvas>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const ros = new ROSLIB.Ros({ url: 'ws://localhost:9090' });
    ros.on('connection', () => { statusEl.textContent = 'CONNECTED'; statusEl.className = 'ok'; });
    ros.on('error', () => { statusEl.textContent = 'ERROR — is rosbridge running?'; statusEl.className = 'bad'; });
    ros.on('close', () => { statusEl.textContent = 'CLOSED'; statusEl.className = 'bad'; });

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d');

    const mapTopic = new ROSLIB.Topic({
      ros: ros, name: '/map', messageType: 'nav_msgs/OccupancyGrid',
      // ask rosbridge for the latched map:
      throttle_rate: 200, queue_length: 1
    });

    mapTopic.subscribe((msg) => {
      const w = msg.info.width, h = msg.info.height, data = msg.data;
      canvas.width = w; canvas.height = h;
      const img = ctx.createImageData(w, h);
      for (let i = 0; i < data.length; i++) {
        const v = data[i];
        let c;
        if (v < 0) c = [45, 52, 64];        // unknown -> grey-blue
        else if (v >= 65) c = [230, 230, 230]; // occupied -> light (walls)
        else c = [20, 28, 38];               // free -> dark
        // flip Y so the map isn't upside-down (ROS origin is bottom-left)
        const x = i % w, y = h - 1 - Math.floor(i / w);
        const p = (y * w + x) * 4;
        img.data[p] = c[0]; img.data[p+1] = c[1]; img.data[p+2] = c[2]; img.data[p+3] = 255;
      }
      ctx.putImageData(img, 0, 0);
    });
  </script>
</body>
</html>
