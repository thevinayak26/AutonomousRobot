# EKF config — autonomous robot, written 2026-06-11
# Fuses wheel odometry forward velocity (vx) with MPU6050 gyro yaw rate.
# EKF owns the odom -> base_link TF. serial_bridge must run with publish_tf=false.
# Launch: ros2 run robot_localization ekf_node --ros-args --params-file ~/ros2_ws/ekf_config.yaml

/**:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Wheel odometry from serial_bridge: fuse ONLY vx.
    # Order: x y z, roll pitch yaw, vx vy vz, vroll vpitch vyaw, ax ay az
    odom0: /odom/wheel
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # MPU6050 via imu_node (frame_id: imu_link): fuse ONLY yaw rate.
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
