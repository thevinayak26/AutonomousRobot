slam_toolbox:
  ros__parameters:
    use_sim_time: false
    base_frame: base_link
    odom_frame: odom
    map_frame: map
    resolution: 0.05
    max_laser_range: 12.0
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    scan_topic: /scan
    mode: mapping
    map_update_interval: 2.0
    enable_interactive_mode: true

